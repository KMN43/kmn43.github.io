                <feGaussianBlur stdDeviation="3.5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <rect width="680" height="860" fill={C.paper}/>
            <rect width="680" height="860" fill="url(#grid)"/>

            {/* Ocean tint */}
            <rect x="550" y="130" width="130" height="410" fill="#dde8f0" opacity="0.55"/>
            <text x="656" y="380" fontSize="7.5" fill="#b8c8d8" textAnchor="middle"
              transform="rotate(90,656,380)" letterSpacing="3"
              style={{userSelect:"none"}}>ATLANTIC OCEAN</text>

            {/* ── STATE FILLS ── */}
            <polygon points={polyStr(NY_STATE)} fill="#e8e2d6" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(MA_STATE)} fill="#e2dcd4" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(CAPE_COD)} fill="#e2dcd4" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(CT_STATE)} fill="#e4ded6" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(RI_STATE)} fill="#e2dcd4" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(PA_STATE)} fill="#e6e0d8" stroke={C.ink5} strokeWidth="1"/>
            <polygon points={polyStr(DC_BOX)}   fill="#d8e8d4" stroke="#888" strokeWidth="1"/>

            {/* ── RIVERS ── */}
            <polyline points={polyStr(HUDSON_R)} fill="none" stroke="#b8ccd8" strokeWidth="1.4" opacity="0.8"/>
            <text x="450" y="390" fontSize="6.5" fill="#b8ccd8" letterSpacing="1"
              transform="rotate(-88,450,390)" style={{userSelect:"none"}}>HUDSON</text>
            <polyline points={polyStr(CT_R)} fill="none" stroke="#b8ccd8" strokeWidth="1" opacity="0.7"/>
            <polyline points={polyStr(DEL_R)} fill="none" stroke="#b8ccd8" strokeWidth="1.2" opacity="0.7"/>
            <text x="348" y="648" fontSize="6.5" fill="#b8ccd8" letterSpacing="1"
              transform="rotate(-88,348,648)" style={{userSelect:"none"}}>DELAWARE</text>
            <polyline points={polyStr(CHES_BAY)} fill="none" stroke="#b8ccd8" strokeWidth="1.4" opacity="0.6"/>
            <text x="248" y="668" fontSize="6.5" fill="#b8ccd8" letterSpacing="1"
              transform="rotate(-88,248,668)" style={{userSelect:"none"}}>CHESAPEAKE</text>

            {/* ── STATE LABELS ── */}
            {[
              [208, 420, "NEW YORK"],
              [470, 272, "MASSACHUSETTS"],
              [480, 498, "CONNECTICUT"],
              [288, 630, "PENNSYLVANIA"],
              [576, 500, "RHODE IS."],
            ].map(([x,y,n]) => (
              <text key={n} x={x} y={y} fontSize="7.5" fill={C.ink5} textAnchor="middle"
                letterSpacing="1.8" fontWeight="500"
                style={{userSelect:"none", fontFamily:"'DM Mono',monospace"}}>{n}</text>
            ))}
            <text x="260" y="796" fontSize="6.5" fill="#6a9a6a" textAnchor="middle"
              letterSpacing="1.5" style={{userSelect:"none"}}>D.C.</text>

            {/* ── ROUTE LINES ── */}
            {SEGS.map((s,i) => (
              <path key={i} d={segPath(s.pts)} fill="none"
                stroke={s.color} strokeWidth={s.w} strokeLinecap="square" opacity="0.85"/>
            ))}

            {/* ── STOPS ── */}
            {STOPS.map((s, i) => {
              if (i === 12) return null; // skip duplicate NYC return dot
              const isSel = sel === i;
              const isHub = i === 0; // NYC bigger
              const r = isHub ? 11 : 8;
              const lp = LABEL[i] || {dx:14,dy:0,anchor:"start"};
              const lx = s.x + lp.dx;
              const ly = s.y + lp.dy;

              return (
                <g key={i} onClick={() => setSel(sel===i ? null : i)}
                  style={{cursor:"pointer"}}>

                  {isSel && (
                    <circle cx={s.x} cy={s.y} r={r+14}
                      fill={s.color} opacity="0.15" filter="url(#glow)"/>
                  )}

                  {/* Station diamond (metro-style square rotated 45°) */}
                  <rect x={s.x-r} y={s.y-r} width={r*2} height={r*2}
                    rx="1"
                    fill={isSel ? s.color : C.paper}
                    stroke={s.color} strokeWidth={isSel ? 2.5 : 2}
                    filter={isSel ? "url(#glow)" : ""}
                  />
                  <rect x={s.x-(r*0.4)} y={s.y-(r*0.4)}
                    width={r*0.8} height={r*0.8}
                    fill={isSel ? "#fff" : s.color} rx="0.5"
                  />

                  {/* Tick line */}
                  <line x1={s.x} y1={s.y}
                    x2={lp.anchor==="start" ? s.x+10 : s.x-10} y2={s.y}
                    stroke={s.color} strokeWidth="1.5" opacity="0.5"/>

                  {/* Labels */}
                  <text x={lx} y={ly-3}
                    textAnchor={lp.anchor} fontSize="9.5" fontWeight="500"
                    fill={isSel ? s.color : C.ink2}
                    letterSpacing="0.08em"
                    style={{userSelect:"none", fontFamily:"'DM Mono',monospace"}}>
                    {s.label}
                  </text>
                  <text x={lx} y={ly+10}
                    textAnchor={lp.anchor} fontSize="7.5"
                    fill={isSel ? s.color+"aa" : C.ink4}
                    letterSpacing="0.04em"
                    style={{userSelect:"none", fontFamily:"'DM Mono',monospace"}}>
                    día {s.days} · {s.short}
                  </text>
                </g>
              );
            })}

            {/* ── LEGEND ── */}
            <rect x="10" y="748" width="232" height="104" rx="2"
              fill={C.bg} stroke={C.ink5} strokeWidth="1"/>
            <text x="20" y="765" fontSize="7.5" fill={C.ink3}
              letterSpacing="2" fontWeight="500"
              style={{fontFamily:"'DM Mono',monospace"}}>LÍNEAS DE RUTA</text>
            {LEGEND.map(([col,name],i) => (
              <g key={i}>
                <line x1="18" y1={776+i*14} x2="44" y2={776+i*14}
                  stroke={col} strokeWidth="4" strokeLinecap="square"/>
                <circle cx="31" cy={776+i*14} r="3"
                  fill={C.bg} stroke={col} strokeWidth="1.5"/>
                <text x="50" y={780+i*14} fontSize="7.5" fill={C.ink4}
                  style={{fontFamily:"'DM Mono',monospace"}}>{name}</text>
              </g>
            ))}

            {/* Compass */}
            <g transform="translate(640,44)">
              <text x="0" y="-14" textAnchor="middle" fontSize="9"
                fill={C.ink4} fontWeight="500">N</text>
              <line x1="0" y1="-10" x2="0" y2="10" stroke={C.ink4} strokeWidth="1.5"/>
              <line x1="-10" y1="0" x2="10" y2="0" stroke={C.ink4} strokeWidth="1.5"/>
              <polygon points="0,-10 -2.5,-3 0,-6 2.5,-3" fill={C.ink4}/>
            </g>

            <text x="670" y="852" textAnchor="end" fontSize="6" fill={C.ink5}
              letterSpacing="1.5" style={{fontFamily:"'DM Mono',monospace"}}>
              ARCHITECTURE &amp; LANDSCAPE LOOP · 14 DÍAS
            </text>
          </svg>
        </div>

        {/* ══════════════════════════════════
            PANEL
        ══════════════════════════════════ */}
        <div style={{flex:"1", minWidth:"272px", maxWidth:"348px"}}>

          {/* Info card */}
          <div className={stop ? "card-in" : ""} style={{
            background: stop ? "#fff" : C.paper,
            border:`1px solid ${stop ? stop.color+"88" : C.ink5}`,
            padding:"18px", marginBottom:"12px",
            minHeight:"260px",
            boxShadow: stop ? `3px 3px 0 ${stop.color}44` : `2px 2px 0 ${C.ink5}`,
            transition:"border-color 0.3s, box-shadow 0.3s",
          }}>
            {!stop ? (
              <div style={{color:C.ink5, fontSize:"0.82rem", lineHeight:2,
                textAlign:"center", paddingTop:"48px",
                fontFamily:"'DM Serif Display',serif", fontStyle:"italic"}}>
                <div style={{fontSize:"2rem", marginBottom:"10px"}}>◈</div>
                Selecciona una parada<br/>del mapa.
              </div>
            ) : (
              <>
                <div style={{display:"flex", alignItems:"flex-start", gap:"10px",
                  marginBottom:"12px"}}>
                  <div style={{
                    border:`2px solid ${stop.color}`,
                    padding:"6px 8px", fontSize:"0.6rem",
                    color:stop.color, fontWeight:500, letterSpacing:"0.12em",
                    textTransform:"uppercase", flexShrink:0, lineHeight:1.3
                  }}>
                    DÍA<br/>{stop.days}
                  </div>
                  <div>
                    <div style={{
                      fontFamily:"'DM Serif Display',serif",
                      fontSize:"1.05rem", color:C.ink, lineHeight:1.2
                    }}>{stop.label}</div>
                    <div style={{fontSize:"0.65rem", color:stop.color,
                      letterSpacing:"0.12em", marginTop:"2px", fontWeight:500}}>
                      {stop.tag}
                    </div>
                  </div>
                </div>

                {/* Tabs */}
                <div style={{display:"flex", marginBottom:"12px",
                  borderBottom:`1px solid ${C.ink5}`}}>
                  {TAB_META.map(t => (
                    <button key={t.key} onClick={() => setTab(t.key)}
                      style={{
                        flex:1, padding:"6px 2px",
                        fontSize:"0.62rem", letterSpacing:"0.06em",
                        background:"none", border:"none",
                        borderBottom: tab===t.key ? `2px solid ${stop.color}` : "2px solid transparent",
                        color: tab===t.key ? stop.color : C.ink4,
                        cursor:"pointer", fontWeight: tab===t.key ? 700 : 400,
                        marginBottom:"-1px", transition:"all 0.15s",
                        fontFamily:"'DM Mono',monospace"
                      }}>
                      {t.label}
                    </button>
                  ))}
                </div>

                <p style={{
                  fontSize:"0.76rem", color:C.ink3,
                  lineHeight:1.8, margin:0, minHeight:"100px"
                }}>
                  {stop[tab]}
                </p>

                <div style={{display:"flex", gap:"8px", marginTop:"14px"}}>
                  <button onClick={() => { setSel(Math.max(0,sel-1)); setTab("arch"); }}
                    disabled={sel===0}
                    style={{
                      flex:1, padding:"7px",
                      background:sel>0?C.paper:"#eee",
                      border:`1px solid ${C.ink5}`,
                      color:sel>0?C.ink3:C.ink5,
                      cursor:sel>0?"pointer":"default",
                      fontSize:"0.7rem", letterSpacing:"0.1em",
                      fontFamily:"'DM Mono',monospace"
                    }}>← PREV</button>
                  <button onClick={() => { setSel(Math.min(STOPS.length-2,sel+1)); setTab("arch"); }}
                    disabled={sel>=STOPS.length-2}
                    style={{
                      flex:1, padding:"7px",
                      background:sel<STOPS.length-2?stop.color:"#ccc",
                      border:"none", color:"#fff",
                      cursor:sel<STOPS.length-2?"pointer":"default",
                      fontSize:"0.7rem", fontWeight:700, letterSpacing:"0.1em",
                      fontFamily:"'DM Mono',monospace"
                    }}>NEXT →</button>
                </div>
              </>
            )}
          </div>

          {/* Stop list */}
          <div style={{
            background:C.paper, border:`1px solid ${C.ink5}`,
            padding:"12px", marginBottom:"12px",
            boxShadow:`2px 2px 0 ${C.ink5}`
          }}>
            <div style={{fontSize:"0.56rem", color:C.ink4, letterSpacing:"0.3em",
              marginBottom:"8px", textTransform:"uppercase"}}>Itinerario</div>
            {STOPS.filter((_,i)=>i<12).map((s,i) => (
              <div key={i} onClick={() => { setSel(sel===i?null:i); setTab("arch"); }}
                style={{
                  display:"flex", alignItems:"center", gap:"8px",
                  padding:"5px 8px", marginBottom:"1px",
                  background:sel===i?s.color+"18":C.bg,
                  borderLeft:`3px solid ${sel===i?s.color:C.ink5}`,
                  cursor:"pointer", transition:"all 0.12s"
                }}>
                <span style={{fontSize:"0.65rem", fontWeight:700,
                  color:sel===i?s.color:C.ink4, minWidth:"26px",
                  letterSpacing:"0.04em"}}>D{s.days}</span>
                <span style={{fontSize:"0.68rem",
                  color:sel===i?s.color:C.ink3, flex:1,
                  overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis"}}>
                  {s.label}
                </span>
                <span style={{width:"6px", height:"6px",
                  background:s.color, flexShrink:0, opacity:0.7}}/>
              </div>
            ))}
          </div>

          {/* Stats */}
          <div style={{
            background:C.paper, border:`1px solid ${C.ink5}`,
            padding:"12px", display:"grid",
            gridTemplateColumns:"1fr 1fr 1fr", gap:"0",
            boxShadow:`2px 2px 0 ${C.ink5}`
          }}>
            {[["14","DÍAS"],["5","ESTADOS"],["~2000","KM"]].map(([v,l],i) => (
              <div key={l} style={{
                textAlign:"center", padding:"8px 4px",
                borderRight:i<2?`1px solid ${C.ink5}`:"none"
              }}>
                <div style={{
                  fontFamily:"'DM Serif Display',serif",
                  fontSize:"1.6rem", color:C.ink, lineHeight:1
                }}>{v}</div>
                <div style={{fontSize:"0.55rem", color:C.ink4, letterSpacing:"0.2em", marginTop:"3px"}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{marginTop:"14px", color:C.ink5, fontSize:"0.6rem",
        letterSpacing:"0.25em", textAlign:"center"}}>
        NYC · HV · ALB · BRK · NOR · BOS · NPT · NHV · PHL · LAN · D.C. · DWG · NYC
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
